<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxRoom</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surf:#12121a; --panel:#1a1a26; --border:#2a2a3d;
  --acc:#00ff88; --acc2:#00ccff; --red:#ff4466; --warn:#ffaa00;
  --txt:#e8e8f0; --muted:#6666aa; --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;}

/* header */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-txt{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.conn-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--border);padding:6px 12px;border-radius:20px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.dot.on{background:var(--acc);box-shadow:0 0 6px var(--acc);}
.dot.warn{background:var(--warn);box-shadow:0 0 6px var(--warn);}

/* screens */
.screen{display:none;}.screen.active{display:block;}

/* lobby */
.lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px;}
.lobby-title{font-family:'Unbounded',sans-serif;font-size:clamp(26px,5vw,46px);font-weight:900;text-align:center;line-height:1.1;margin-bottom:8px;}
.lobby-title span{background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.lobby-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:40px;}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:580px;margin-bottom:16px;}
@media(max-width:520px){.cards{grid-template-columns:1fr;}}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:24px;transition:border-color .2s,transform .2s;}
.card:hover{border-color:var(--acc);transform:translateY(-2px);}
.card-title{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;margin-bottom:14px;color:var(--acc);letter-spacing:.5px;}
.ig{display:flex;flex-direction:column;gap:8px;}
.inp{background:var(--surf);border:1px solid var(--border);border-radius:8px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px 14px;outline:none;transition:border-color .2s;width:100%;}
.inp:focus{border-color:var(--acc);}
.inp::placeholder{color:var(--muted);}
.btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--txt);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:10px 18px;transition:all .15s;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;width:100%;}
.btn:hover{background:var(--border);}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-g{background:var(--acc);border-color:var(--acc);color:#000;}.btn-g:hover{background:#00e07a;}
.btn-b{background:var(--acc2);border-color:var(--acc2);color:#000;}.btn-b:hover{background:#00b8e6;}
.btn-r{background:var(--red);border-color:var(--red);color:#fff;}.btn-r:hover{background:#e03055;}
.hint{font-size:11px;color:var(--muted);text-align:center;}

/* room */
#roomScreen{display:none;flex-direction:column;gap:14px;}
#roomScreen.active{display:flex;}
.room-hdr{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.room-name{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:var(--acc);margin-bottom:3px;}
.room-id-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);}
.room-id-val{background:var(--surf);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--acc2);cursor:pointer;transition:border-color .2s;}
.room-id-val:hover{border-color:var(--acc2);}

.room-body{display:grid;grid-template-columns:190px 1fr 280px;gap:14px;}
@media(max-width:700px){.room-body{grid-template-columns:1fr;}}

/* sidebar channels */
.sidebar{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.sidebar-title{padding:12px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border);}
.ch-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);}
.ch-item.active{background:rgba(0,255,136,.08);color:var(--acc);}
.ch-icon{font-size:13px;opacity:.7;}
.ch-name{flex:1;}
.ch-cnt{font-size:10px;color:var(--muted);background:var(--surf);border-radius:10px;padding:1px 6px;}

/* users */
.users-panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.users-title{padding:12px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.users-cnt{background:var(--acc);color:#000;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;}
.users-list{padding:8px;display:flex;flex-direction:column;gap:4px;min-height:160px;}
.u-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;background:var(--surf);border:1px solid transparent;transition:all .2s;}
.u-item.speaking{border-color:var(--acc);background:rgba(0,255,136,.05);box-shadow:0 0 10px rgba(0,255,136,.1);}
.u-item.muted{opacity:.55;}
.ava{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Unbounded',sans-serif;overflow:hidden;}
.ava img{width:100%;height:100%;object-fit:cover;border-radius:7px;}
.u-name{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.u-badges{display:flex;gap:3px;align-items:center;}
.you-tag{font-size:9px;color:var(--acc);background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.2);border-radius:4px;padding:1px 5px;font-weight:700;}
.host-tag{font-size:9px;color:var(--warn);background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.25);border-radius:4px;padding:1px 5px;font-weight:700;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,255,136,.4);}70%{box-shadow:0 0 0 7px rgba(0,255,136,0);}100%{box-shadow:0 0 0 0 rgba(0,255,136,0);}}
.u-item.speaking .ava{animation:pulse 1.2s ease-out infinite;}
.empty-st{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 16px;color:var(--muted);font-size:12px;gap:6px;text-align:center;}
.empty-st .esi{font-size:26px;opacity:.4;}

/* chat */
.chat-panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden;height:100%;min-height:300px;}
.chat-title{padding:12px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border);flex-shrink:0;}
.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;}
.chat-msg{display:flex;gap:7px;align-items:flex-start;}
.chat-msg.mine{flex-direction:row-reverse;}
.cm-ava{width:26px;height:26px;border-radius:7px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Unbounded',sans-serif;}
.cm-ava img{width:100%;height:100%;object-fit:cover;}
.cm-body{max-width:75%;}
.chat-msg.mine .cm-body{align-items:flex-end;display:flex;flex-direction:column;}
.cm-name{font-size:10px;color:var(--muted);margin-bottom:2px;}
.chat-msg.mine .cm-name{text-align:right;}
.cm-text{background:var(--surf);border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12px;line-height:1.4;word-break:break-word;}
.chat-msg.mine .cm-text{background:rgba(0,255,136,.07);border-color:rgba(0,255,136,.18);color:var(--acc);}
.cm-time{font-size:9px;color:var(--muted);margin-top:2px;}
.chat-sys{font-size:11px;color:var(--muted);text-align:center;font-style:italic;padding:1px 0;}
.chat-inp-row{display:flex;gap:7px;padding:9px;border-top:1px solid var(--border);flex-shrink:0;}
.chat-inp{flex:1;background:var(--surf);border:1px solid var(--border);border-radius:8px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 11px;outline:none;transition:border-color .2s;}
.chat-inp:focus{border-color:var(--acc);}
.chat-send{width:34px;height:34px;border-radius:8px;border:1px solid var(--acc);background:rgba(0,255,136,.08);color:var(--acc);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;flex-shrink:0;}
.chat-send:hover{background:rgba(0,255,136,.18);}

/* controls */
.ctrl-bar{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.ctrl-left{display:flex;align-items:center;gap:9px;}
.ctrl-grp{display:flex;flex-direction:column;align-items:center;gap:3px;}
.ctrl-btn{width:42px;height:42px;border-radius:10px;border:1px solid var(--border);background:var(--surf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s;}
.ctrl-btn:hover{border-color:var(--acc);background:rgba(0,255,136,.05);}
.ctrl-btn.muted{border-color:var(--red);background:rgba(255,68,102,.09);}
.ctrl-btn:active{transform:scale(.92);}
.ctrl-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.vol-sl{-webkit-appearance:none;appearance:none;width:88px;height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer;}
.vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--acc);cursor:pointer;}

/* log */
.log-panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.log-title{padding:9px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border);}
.log-entries{padding:7px 14px;max-height:90px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.log-e{font-size:11px;color:var(--muted);display:flex;gap:7px;}
.log-e .lt{color:rgba(102,102,170,.45);flex-shrink:0;}
.log-e.info .lm{color:var(--acc2);}
.log-e.ok .lm{color:var(--acc);}
.log-e.warn .lm{color:var(--warn);}
.log-e.err .lm{color:var(--red);}

/* toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:11px 16px;font-size:12px;z-index:1000;opacity:0;transform:translateY(7px);transition:all .2s;pointer-events:none;max-width:260px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{border-color:var(--acc);color:var(--acc);}
.toast.err{border-color:var(--red);color:var(--red);}
.toast.info{border-color:var(--acc2);color:var(--acc2);}
.toast.warn{border-color:var(--warn);color:var(--warn);}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🎙</div>
      <div class="logo-txt">VoxRoom</div>
    </div>
    <div class="conn-badge">
      <div class="dot" id="dot"></div>
      <span id="connTxt">не подключён</span>
    </div>
  </header>

  <!-- LOBBY -->
  <div id="lobbyScreen" class="screen active">
    <div class="lobby">
      <div class="lobby-title">Голосовой чат<br><span>без регистрации</span></div>
      <div class="lobby-sub">WebRTC · Hub-топология · неограниченно участников</div>
      <div class="cards">
        <div class="card">
          <div class="card-title">// создать комнату</div>
          <div class="ig">
            <input class="inp" id="cNick" placeholder="Ник" maxlength="20">
            <input class="inp" id="cAvatar" placeholder="URL аватарки (необязательно)" maxlength="400">
            <button class="btn btn-g" id="cBtn" onclick="createRoom()">Создать</button>
          </div>
        </div>
        <div class="card">
          <div class="card-title">// войти в комнату</div>
          <div class="ig">
            <input class="inp" id="jNick" placeholder="Ник" maxlength="20">
            <input class="inp" id="jAvatar" placeholder="URL аватарки (необязательно)" maxlength="400">
            <input class="inp" id="jRoom" placeholder="ID комнаты" maxlength="12">
            <button class="btn btn-b" id="jBtn" onclick="joinRoom()">Войти</button>
          </div>
        </div>
      </div>
      <div class="hint">Создай → ID скопируется → поделись · <b>M</b> = мут</div>
    </div>
  </div>

  <!-- ROOM -->
  <div id="roomScreen" class="screen">
    <div class="room-hdr">
      <div>
        <div class="room-name" id="rTitle">Комната</div>
        <div class="room-id-row">
          ID: <span class="room-id-val" id="rId" onclick="copyId()">—</span>
          <span style="font-size:10px;opacity:.35">← скопировать</span>
        </div>
      </div>
      <button class="btn btn-r" style="width:auto;padding:9px 16px;" onclick="leaveRoom()">Выйти</button>
    </div>

    <div class="room-body">
      <!-- sidebar -->
      <div class="sidebar">
        <div class="sidebar-title">Каналы</div>
        <div class="ch-item active"><span class="ch-icon">🔊</span><span class="ch-name">Основной</span><span class="ch-cnt" id="chCnt">0</span></div>
        <div class="ch-item" style="opacity:.35"><span class="ch-icon">🔇</span><span class="ch-name">AFK</span></div>
      </div>

      <!-- users -->
      <div class="users-panel">
        <div class="users-title">Участники <span class="users-cnt" id="uCnt">0</span></div>
        <div class="users-list" id="uList">
          <div class="empty-st"><div class="esi">👥</div><div>Пусто</div></div>
        </div>
      </div>

      <!-- chat -->
      <div class="chat-panel">
        <div class="chat-title">💬 Чат</div>
        <div class="chat-msgs" id="chatBox"></div>
        <div class="chat-inp-row">
          <input class="chat-inp" id="chatInp" placeholder="Сообщение…" maxlength="500"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}">
          <button class="chat-send" onclick="sendMsg()" title="Отправить">➤</button>
        </div>
      </div>
    </div>

    <div class="ctrl-bar">
      <div class="ctrl-left">
        <div class="ctrl-grp">
          <div class="ctrl-btn" id="muteBtn" onclick="toggleMute()">🎙</div>
          <div class="ctrl-lbl">Микрофон</div>
        </div>
        <div class="ctrl-grp">
          <div class="ctrl-btn" id="deafBtn" onclick="toggleDeaf()">🔊</div>
          <div class="ctrl-lbl">Звук</div>
        </div>
        <div class="ctrl-grp" style="margin-left:6px;">
          <input type="range" class="vol-sl" id="volSl" min="0" max="100" value="100" oninput="setVol(this.value)">
          <div class="ctrl-lbl">Громкость</div>
        </div>
      </div>
      <div id="myLabel" style="font-size:12px;color:var(--muted);"></div>
    </div>

    <div class="log-panel">
      <div class="log-title">Журнал</div>
      <div class="log-entries" id="logBox"></div>
    </div>
  </div>
</div>
<div class="toast" id="toastEl"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const ICE_SERVERS = [
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun2.l.google.com:19302'},
  {urls:'stun:stun.cloudflare.com:3478'},
  {urls:'turn:global.relay.metered.ca:80',               username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:global.relay.metered.ca:443',              username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:global.relay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'}
];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let peer = null;        // PeerJS instance
let myStream = null;    // local mic stream
let myId = null;
let myNick = '';
let myAvatar = '';
let roomId = null;
let amHost = false;
let isMuted = false;
let isDeaf = false;
let vol = 1.0;

// Host state
const parts = {};       // pid → {nick, avatar, dataConn, srcNode, gainNode, stream}
const outCalls = {};    // pid → outgoing MediaConnection (host→participant)
let audioCtx = null;
let masterDest = null;

// Client state
let hostConn = null;    // DataConnection to host
let hostCall = null;    // incoming MediaConnection from host (mixed audio)
let clientAudio = null; // <audio> element

// Shared display state
const users = {};       // pid → {nick, avatar, muted}

// ═══════════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════════
const G = id => document.getElementById(id);

function setConn(txt, mode) {
  G('connTxt').textContent = txt;
  G('dot').className = 'dot' + (mode ? ' '+mode : '');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  G(id).classList.add('active');
}

let _tt;
function toast(msg, type='info') {
  const e = G('toastEl');
  e.textContent = msg;
  e.className = 'toast show ' + type;
  clearTimeout(_tt);
  _tt = setTimeout(() => e.className='toast', 3200);
}

function log(msg, type='') {
  const box = G('logBox');
  const d = new Date();
  const t = [d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  const e = document.createElement('div');
  e.className = 'log-e ' + type;
  e.innerHTML = '<span class="lt">'+t+'</span><span class="lm">'+msg+'</span>';
  box.appendChild(e);
  box.scrollTop = box.scrollHeight;
}

function setBtn(id, dis) { const b=G(id); if(b) b.disabled=dis; }

// ═══════════════════════════════════════════════════════════════
//  AVATARS & COLORS
// ═══════════════════════════════════════════════════════════════
const AVC = [
  ['#00ff88','#003322'],['#00ccff','#002233'],['#ff6688','#330011'],
  ['#ffaa00','#332200'],['#aa88ff','#220033'],['#44ddaa','#001122']
];
function avaColor(s) {
  let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))&0xffff;
  return AVC[h%AVC.length];
}
function ini(n) { return n.substring(0,2).toUpperCase(); }

function avaHTML(nick, avatar, size=32) {
  const [bg,fg] = avaColor(nick);
  if (avatar) {
    return `<div class="ava" style="width:${size}px;height:${size}px;"><img src="${avatar}" onerror="this.parentNode.innerHTML='${ini(nick)}';this.parentNode.style.background='${bg}';this.parentNode.style.color='${fg}';"></div>`;
  }
  return `<div class="ava" style="width:${size}px;height:${size}px;background:${bg};color:${fg};">${ini(nick)}</div>`;
}

// ═══════════════════════════════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════════════════════════════
function hh() {
  const d=new Date();
  return [d.getHours(),d.getMinutes()].map(n=>String(n).padStart(2,'0')).join(':');
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMsg(id, nick, avatar, text, sys) {
  const box = G('chatBox');
  if (!box) return;
  if (sys) {
    const d = document.createElement('div');
    d.className = 'chat-sys';
    d.textContent = text;
    box.appendChild(d);
  } else {
    const mine = (id === myId);
    const av = avaHTML(nick, avatar, 26).replace('class="ava"', 'class="cm-ava"');
    const d = document.createElement('div');
    d.className = 'chat-msg' + (mine ? ' mine' : '');
    d.innerHTML = av +
      `<div class="cm-body">
        <div class="cm-name">${esc(nick)}</div>
        <div class="cm-text">${esc(text)}</div>
        <div class="cm-time">${hh()}</div>
      </div>`;
    box.appendChild(d);
  }
  box.scrollTop = box.scrollHeight;
}

function sendMsg() {
  const inp = G('chatInp');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  const msg = {type:'chat', id:myId, nick:myNick, avatar:myAvatar, text};
  appendMsg(myId, myNick, myAvatar, text, false);
  if (amHost) bcastHost(msg);
  else if (hostConn && hostConn.open) hostConn.send(msg);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER USERS
// ═══════════════════════════════════════════════════════════════
const spkT = {};
function renderUsers() {
  const list = G('uList');
  const entries = Object.entries(users);

  // Remove stale
  list.querySelectorAll('.u-item').forEach(el => {
    if (!users[el.dataset.pid]) el.remove();
  });

  if (entries.length) list.querySelector('.empty-st')?.remove();
  else if (!list.querySelector('.empty-st')) {
    list.innerHTML = '<div class="empty-st"><div class="esi">👥</div><div>Пусто</div></div>';
  }

  for (const [pid, u] of entries) {
    let item = G('ui-'+pid);
    if (!item) {
      item = document.createElement('div');
      item.className = 'u-item';
      item.id = 'ui-'+pid;
      item.dataset.pid = pid;
      list.appendChild(item);
    }
    const isMe = pid === myId;
    const isH = amHost && isMe;
    item.className = 'u-item' + (u.muted ? ' muted' : '');
    item.innerHTML =
      avaHTML(u.nick, u.avatar) +
      `<div class="u-name">${esc(u.nick)}</div>` +
      `<div class="u-badges">` +
        (u.muted ? '<span title="Заглушен">🔇</span>' : '') +
        (isMe  ? '<span class="you-tag">ВЫ</span>' : '') +
        (isH   ? '<span class="host-tag">HOST</span>' : '') +
      `</div>`;
  }

  const cnt = entries.length;
  G('chCnt').textContent = cnt;
  G('uCnt').textContent = cnt;
}

function watchSpeak(stream, pid) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const src = ctx.createMediaStreamSource(stream);
    const an = ctx.createAnalyser(); an.fftSize=256; src.connect(an);
    const buf = new Uint8Array(an.frequencyBinCount);
    function tick() {
      if (!G('roomScreen').classList.contains('active')) { ctx.close(); return; }
      an.getByteFrequencyData(buf);
      const avg = buf.reduce((a,b)=>a+b,0)/buf.length;
      const el = G('ui-'+pid);
      if (el && avg>8) {
        el.classList.add('speaking');
        clearTimeout(spkT[pid]);
        spkT[pid] = setTimeout(()=>el.classList.remove('speaking'), 400);
      }
      requestAnimationFrame(tick);
    }
    tick();
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
//  HOST — AUDIO MIXER
// ═══════════════════════════════════════════════════════════════
function initCtx() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterDest = audioCtx.createMediaStreamDestination();
}

function buildMixFor(excludePid) {
  // Create a fresh destination for this participant's mix
  const dest = audioCtx.createMediaStreamDestination();
  // Host's own mic
  if (myStream) {
    const src = audioCtx.createMediaStreamSource(myStream);
    src.connect(dest);
  }
  // All other participants except excludePid
  for (const [pid, p] of Object.entries(parts)) {
    if (pid === excludePid) continue;
    if (p.gainNode) p.gainNode.connect(dest);
  }
  return dest.stream;
}

function updateMixes() {
  for (const [pid,] of Object.entries(parts)) {
    if (!outCalls[pid]) continue;
    const mix = buildMixFor(pid);
    try {
      const pc = outCalls[pid].peerConnection;
      if (!pc) continue;
      const sender = pc.getSenders().find(s => s.track && s.track.kind==='audio');
      if (sender) {
        const track = mix.getAudioTracks()[0];
        if (track) sender.replaceTrack(track).catch(()=>{});
      }
    } catch(e) {}
  }
}

function hostAddStream(pid, stream) {
  if (!parts[pid]) return;
  initCtx();
  // Clean old nodes
  try { parts[pid].srcNode?.disconnect(); } catch(e) {}
  try { parts[pid].gainNode?.disconnect(); } catch(e) {}

  const src  = audioCtx.createMediaStreamSource(stream);
  const gain = audioCtx.createGain(); gain.gain.value = 1.0;
  src.connect(gain);
  // Connect to master (used for mix building)
  gain.connect(masterDest);

  parts[pid].srcNode  = src;
  parts[pid].gainNode = gain;
  parts[pid].stream   = stream;

  log('Поток от ' + (parts[pid].nick||pid), 'ok');
  updateMixes();
  watchSpeak(stream, pid);
}

// ═══════════════════════════════════════════════════════════════
//  HOST — INCOMING CONNECTIONS
// ═══════════════════════════════════════════════════════════════
function hostOnData(conn) {
  const pid = conn.peer;
  conn.on('data', msg => {
    if (!msg || !msg.type) return;

    if (msg.type === 'join') {
      const nick   = msg.nick   || 'Unknown';
      const avatar = msg.avatar || '';
      log(nick + ' подключается…', 'info');

      // Register
      parts[pid] = { nick, avatar, dataConn:conn, srcNode:null, gainNode:null, stream:null };
      users[pid] = { nick, avatar, muted:false };

      // Send welcome: full current user list
      const ul = Object.entries(users)
        .filter(([id]) => id !== pid)
        .map(([id, u]) => ({id, nick:u.nick, avatar:u.avatar||'', muted:u.muted}));
      conn.send({ type:'welcome', users:ul, hostId:myId, hostNick:myNick, hostAvatar:myAvatar });

      // Notify everyone else about newcomer
      bcastHost({ type:'user_joined', id:pid, nick, avatar });
      appendMsg(pid, nick, avatar, nick+' вошёл в комнату', true);

      toast(nick+' вошёл', 'ok');
      log(nick+' вошёл', 'ok');
      renderUsers();
    }

    if (msg.type === 'mute') {
      if (users[pid])  users[pid].muted  = msg.muted;
      if (parts[pid])  parts[pid].muted  = msg.muted;
      bcastHost({ type:'user_mute', id:pid, muted:msg.muted });
      renderUsers();
    }

    if (msg.type === 'chat') {
      // Relay to everyone else
      for (const [eid, ep] of Object.entries(parts))
        if (eid !== pid && ep.dataConn?.open)
          try { ep.dataConn.send(msg); } catch(e) {}
      appendMsg(msg.id||pid, msg.nick, msg.avatar||'', msg.text, false);
    }

    if (msg.type === 'leave') hostRemove(pid);
  });
  conn.on('close', () => hostRemove(pid));
  conn.on('error', () => hostRemove(pid));
}

function hostOnCall(call) {
  const pid = call.peer;
  initCtx();
  // Answer immediately with this participant's mix
  const mix = buildMixFor(pid);
  call.answer(mix);
  outCalls[pid] = call;

  call.on('stream', stream => {
    if (parts[pid]) {
      hostAddStream(pid, stream);
    } else {
      // Data channel join might arrive slightly later
      let tries = 0;
      const wait = () => {
        if (parts[pid]) hostAddStream(pid, stream);
        else if (tries++ < 10) setTimeout(wait, 300);
        else log('Поток от '+pid+': участник не найден', 'warn');
      };
      setTimeout(wait, 200);
    }
  });
  call.on('close', () => { delete outCalls[pid]; updateMixes(); });
  call.on('error', () => { delete outCalls[pid]; updateMixes(); });
}

function hostRemove(pid) {
  if (!parts[pid]) return;
  const nick = parts[pid].nick || pid;
  try { parts[pid].srcNode?.disconnect();  } catch(e) {}
  try { parts[pid].gainNode?.disconnect(); } catch(e) {}
  try { outCalls[pid]?.close();            } catch(e) {}
  delete outCalls[pid];
  delete parts[pid];
  delete users[pid];
  bcastHost({ type:'user_left', id:pid, nick });
  appendMsg(pid, nick, '', nick+' покинул комнату', true);
  toast(nick+' вышел', 'warn');
  log(nick+' вышел', 'warn');
  renderUsers();
  updateMixes();
}

function bcastHost(msg) {
  for (const [, p] of Object.entries(parts))
    if (p.dataConn?.open) try { p.dataConn.send(msg); } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
//  CLIENT — CONNECT TO HOST
// ═══════════════════════════════════════════════════════════════
function clientConnect(hostId) {
  log('Коннектимся к хосту…', 'info');

  // 1. Data channel
  const conn = peer.connect(hostId, { reliable:true });
  hostConn = conn;

  conn.on('open', () => {
    log('Data-канал открыт', 'ok');
    conn.send({ type:'join', nick:myNick, avatar:myAvatar });
  });

  conn.on('data', msg => {
    if (!msg || !msg.type) return;

    if (msg.type === 'welcome') {
      // Populate users list
      for (const u of msg.users)
        users[u.id] = { nick:u.nick, avatar:u.avatar||'', muted:u.muted };
      users[msg.hostId] = { nick:msg.hostNick, avatar:msg.hostAvatar||'', muted:false };
      users[myId] = { nick:myNick, avatar:myAvatar, muted:isMuted };
      renderUsers();
      toast('Подключён!', 'ok');
      log('В комнате: '+Object.keys(users).length+' чел.', 'ok');
    }
    if (msg.type === 'user_joined') {
      users[msg.id] = { nick:msg.nick, avatar:msg.avatar||'', muted:false };
      appendMsg(msg.id, msg.nick, msg.avatar||'', msg.nick+' вошёл в комнату', true);
      toast(msg.nick+' вошёл', 'ok');
      log(msg.nick+' вошёл', 'ok');
      renderUsers();
    }
    if (msg.type === 'user_left') {
      appendMsg(msg.id, msg.nick, '', msg.nick+' покинул комнату', true);
      delete users[msg.id];
      toast(msg.nick+' вышел', 'warn');
      log(msg.nick+' вышел', 'warn');
      renderUsers();
    }
    if (msg.type === 'user_mute') {
      if (users[msg.id]) users[msg.id].muted = msg.muted;
      renderUsers();
    }
    if (msg.type === 'chat') {
      appendMsg(msg.id||'?', msg.nick, msg.avatar||'', msg.text, false);
    }
    if (msg.type === 'host_leaving') {
      toast('Хост покинул комнату', 'warn');
      log('Хост закрыл комнату', 'warn');
    }
  });

  conn.on('close', () => { toast('Соединение с хостом потеряно', 'err'); log('Хост отключился', 'err'); });
  conn.on('error', e => { toast('Ошибка: '+e.message, 'err'); log('Err: '+e.message, 'err'); });

  // 2. Audio call to host — send our mic, receive mixed stream
  setTimeout(() => {
    log('Звоним хосту…', 'info');
    const call = peer.call(hostId, myStream, { config:{iceServers:ICE_SERVERS} });
    hostCall = call;
    call.on('stream', stream => {
      log('Получили аудио-микс', 'ok');
      if (!clientAudio) {
        clientAudio = document.createElement('audio');
        clientAudio.autoplay = true;
        clientAudio.style.display = 'none';
        document.body.appendChild(clientAudio);
      }
      clientAudio.srcObject = stream;
      clientAudio.volume = isDeaf ? 0 : vol;
      clientAudio.play().catch(()=>{});
    });
    call.on('close', () => log('Аудио с хостом закрыто', 'warn'));
    call.on('error', e => log('Аудио ошибка: '+e.message, 'err'));
  }, 600);
}

// ═══════════════════════════════════════════════════════════════
//  PEER SETUP
// ═══════════════════════════════════════════════════════════════
function setupPeer() {
  if (amHost) {
    peer.on('connection', conn => {
      const pid = conn.peer;
      // Pre-register slot so hostOnCall can find it
      if (!parts[pid]) parts[pid] = { nick:null, avatar:'', dataConn:null, srcNode:null, gainNode:null, stream:null };
      parts[pid].dataConn = conn;
      conn.on('open', () => hostOnData(conn));
    });
    peer.on('call', call => hostOnCall(call));
  }

  peer.on('disconnected', () => {
    setConn('переподключение…', 'warn');
    log('Разрыв, реконнект…', 'warn');
    let n = 0;
    function retry() {
      if (!peer || peer.destroyed) return;
      if (peer.open) { setConn('онлайн', 'on'); return; }
      if (n++ >= 5) { toast('Разрыв — обнови страницу', 'err'); setConn('разрыв', 'warn'); return; }
      try { peer.reconnect(); } catch(e) {}
      setTimeout(() => { if (peer && !peer.open) retry(); }, 2000*n);
    }
    setTimeout(retry, 1000);
  });

  peer.on('error', err => {
    log('Peer ['+err.type+']: '+err.message, 'err');
    if (err.type === 'unavailable-id')   toast('ID занят, попробуй снова', 'err');
    if (err.type === 'peer-unavailable') toast('Комната не найдена', 'err');
    if (err.type === 'network' || err.type === 'server-error') toast('Сетевая ошибка…', 'warn');
  });
}

// ═══════════════════════════════════════════════════════════════
//  PEER FACTORY  (tries default SDK broker — most reliable)
// ═══════════════════════════════════════════════════════════════
function makePeer(id) {
  return new Promise((res, rej) => {
    // Use PeerJS defaults — SDK auto-selects the best broker
    const p = new Peer(id, {
      debug: 0,
      config: { iceServers: ICE_SERVERS }
    });
    let done = false;
    const t = setTimeout(() => {
      if (done) return; done = true;
      try { p.destroy(); } catch(e) {}
      rej(new Error('Timeout — сервер недоступен'));
    }, 12000);
    p.on('open', pid => {
      if (done) return; done = true;
      clearTimeout(t); res({ p, pid });
    });
    p.on('error', e => {
      if (done) return; done = true;
      clearTimeout(t);
      try { p.destroy(); } catch(ex) {}
      rej(e);
    });
  });
}

async function getMic() {
  return navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true },
    video: false
  });
}

function genId() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:8}, ()=>c[Math.floor(Math.random()*c.length)]).join('');
}

// ═══════════════════════════════════════════════════════════════
//  CREATE ROOM
// ═══════════════════════════════════════════════════════════════
async function createRoom() {
  const nick = G('cNick').value.trim();
  if (!nick) { toast('Введи ник!', 'err'); return; }
  myNick   = nick;
  myAvatar = G('cAvatar').value.trim();
  setBtn('cBtn', true);
  setConn('микрофон…');

  try { myStream = await getMic(); }
  catch(e) { toast('Нет доступа к микрофону', 'err'); log('Mic: '+e.message, 'err'); setBtn('cBtn', false); return; }

  roomId  = genId();
  amHost  = true;
  setConn('подключение…');

  try {
    const {p, pid} = await makePeer('voxroom-'+roomId);
    peer = p; myId = pid;
    users[myId] = { nick:myNick, avatar:myAvatar, muted:false };
    setupPeer();
    initCtx();
    setConn('онлайн', 'on');
    log('Комната создана: '+roomId, 'ok');
    try { await navigator.clipboard.writeText(roomId); toast('ID скопирован: '+roomId, 'ok'); }
    catch(e) { toast('ID: '+roomId, 'info'); }
    watchSpeak(myStream, myId);
    enterUI();
  } catch(e) {
    setConn('ошибка', 'warn');
    toast('Ошибка подключения: '+e.message, 'err');
    log(''+e.message, 'err');
  }
  setBtn('cBtn', false);
}

// ═══════════════════════════════════════════════════════════════
//  JOIN ROOM
// ═══════════════════════════════════════════════════════════════
async function joinRoom() {
  const nick = G('jNick').value.trim();
  const rid  = G('jRoom').value.trim().toUpperCase().replace(/\s/g,'');
  if (!nick) { toast('Введи ник!', 'err'); return; }
  if (!rid)  { toast('Введи ID комнаты!', 'err'); return; }
  myNick   = nick;
  myAvatar = G('jAvatar').value.trim();
  setBtn('jBtn', true);
  setConn('микрофон…');

  try { myStream = await getMic(); }
  catch(e) { toast('Нет доступа к микрофону', 'err'); log('Mic: '+e.message, 'err'); setBtn('jBtn', false); return; }

  roomId = rid;
  amHost = false;
  setConn('подключение…');

  const suffix = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  try {
    const {p, pid} = await makePeer('voxroom-'+rid+'-'+suffix);
    peer = p; myId = pid;
    users[myId] = { nick:myNick, avatar:myAvatar, muted:false };
    setupPeer();
    setConn('онлайн', 'on');
    clientConnect('voxroom-'+rid);
    watchSpeak(myStream, myId);
    enterUI();
  } catch(e) {
    setConn('ошибка', 'warn');
    toast('Ошибка: '+e.message, 'err');
    log(''+e.message, 'err');
  }
  setBtn('jBtn', false);
}

// ═══════════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════════
function enterUI() {
  G('rTitle').textContent = 'Комната '+roomId;
  G('rId').textContent    = roomId;
  const lbl = G('myLabel');
  if (myAvatar) {
    lbl.innerHTML = `<img src="${myAvatar}" style="width:19px;height:19px;border-radius:5px;vertical-align:middle;margin-right:5px;object-fit:cover;" onerror="this.remove()">` + (amHost?'👑 ':'🎙 ') + myNick;
  } else {
    lbl.textContent = (amHost?'👑 ':'🎙 ') + myNick;
  }
  renderUsers();
  showScreen('roomScreen');
}

function doCleanup() {
  if (amHost) {
    bcastHost({ type:'host_leaving' });
    for (const pid of Object.keys(parts)) hostRemove(pid);
    try { audioCtx?.close(); } catch(e) {}
    audioCtx = null; masterDest = null;
  } else {
    if (hostConn?.open) try { hostConn.send({ type:'leave' }); } catch(e) {}
    try { hostCall?.close(); } catch(e) {}
    if (clientAudio) { clientAudio.srcObject=null; clientAudio=null; }
    hostConn = null; hostCall = null;
  }
  if (myStream) { myStream.getTracks().forEach(t=>t.stop()); myStream=null; }
  try { peer?.destroy(); } catch(e) {}
  peer = null;
  for (const k of Object.keys(users)) delete users[k];
  for (const k of Object.keys(parts)) delete parts[k];
  for (const k of Object.keys(outCalls)) delete outCalls[k];
  myId=null; roomId=null; amHost=false; isMuted=false; isDeaf=false;
}

function leaveRoom() {
  doCleanup();
  G('muteBtn').textContent='🎙'; G('muteBtn').className='ctrl-btn';
  G('deafBtn').textContent='🔊'; G('deafBtn').className='ctrl-btn';
  G('logBox').innerHTML='';
  G('chatBox').innerHTML='';
  setConn('не подключён');
  showScreen('lobbyScreen');
}

function toggleMute() {
  isMuted = !isMuted;
  if (myStream) myStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  const b = G('muteBtn');
  b.textContent = isMuted ? '🔇' : '🎙';
  b.className   = 'ctrl-btn' + (isMuted ? ' muted' : '');
  if (users[myId]) users[myId].muted = isMuted;
  renderUsers();
  if (!amHost && hostConn?.open) hostConn.send({ type:'mute', muted:isMuted });
  if (amHost) bcastHost({ type:'user_mute', id:myId, muted:isMuted });
  log(isMuted ? 'Микрофон выкл.' : 'Микрофон вкл.', isMuted?'warn':'ok');
}

function toggleDeaf() {
  isDeaf = !isDeaf;
  if (clientAudio) clientAudio.volume = isDeaf ? 0 : vol;
  const b = G('deafBtn');
  b.textContent = isDeaf ? '🔈' : '🔊';
  b.className   = 'ctrl-btn' + (isDeaf ? ' muted' : '');
  if (isDeaf && !isMuted) toggleMute();
}

function setVol(v) {
  vol = v/100;
  if (!isDeaf && clientAudio) clientAudio.volume = vol;
}

async function copyId() {
  try { await navigator.clipboard.writeText(roomId); toast('ID скопирован!', 'ok'); }
  catch(e) { toast(roomId, 'info'); }
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (G('roomScreen').classList.contains('active') && e.code==='KeyM' && !e.target.matches('input'))
    toggleMute();
});

// URL param
window.addEventListener('load', () => {
  const rid = new URLSearchParams(location.search).get('room');
  if (rid) { G('jRoom').value=rid.toUpperCase(); toast('ID вставлен — введи ник','info'); }
});
</script>
